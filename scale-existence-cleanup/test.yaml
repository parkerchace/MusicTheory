batch_processing:
  batch_size: 10
  checkpoint_interval: 50
  delay_between_batches_seconds: 1.0
  enable_pause_resume: true
  max_concurrent_requests: 3
cultural_search_terms:
  arabic:
  - maqam
  - arabic music
  - middle eastern
  chinese:
  - pentatonic
  - chinese traditional
  - guqin
  indian:
  - raga
  - hindustani
  - carnatic
  - indian classical
  japanese:
  - gagaku
  - japanese traditional
  - koto
  western:
  - classical
  - jazz
  - blues
  - folk
database:
  backup_directory: ./backups
  create_backups: true
  database_file_path: ../music-theory-engine.js
  validate_after_modification: true
fair_use:
  educational_purpose_statement: Educational research and database quality improvement
  max_content_length_per_source: 1000
  max_sources_per_scale: 5
  respect_robots_txt: true
  user_agent: Scale-Existence-Cleanup-Bot/1.0 (Educational Research)
logging:
  backup_count: 5
  log_file_path: scale_cleanup.log
  log_level: INFO
  log_to_console: true
  log_to_file: true
  max_log_file_size_mb: 10
quality_thresholds:
  minimum_educational_value: 0.4
  minimum_information_completeness: 0.3
  minimum_overall_quality: 0.5
  minimum_source_authority: 0.2
removal_criteria:
  allow_commercial_sources: false
  flag_ambiguous_cases: true
  minimum_confidence_for_removal: 0.8
  minimum_sources_required: 1
  require_dedicated_sources: true
  require_educational_sources: true
  traditional_scale_leniency: true
reporting:
  generate_json_reports: true
  generate_markdown_reports: true
  include_detailed_statistics: true
  include_removal_details: true
  report_directory: ./reports
scale_alternative_names:
  dorian:
  - dorian mode
  major:
  - ionian
  - diatonic major
  minor:
  - natural minor
  - aeolian
  mixolydian:
  - mixolydian mode
  pentatonic:
  - pentatonic scale
  - five-note scale
search_engines:
- api_endpoint: https://www.googleapis.com/customsearch/v1
  api_key: ''
  enabled: true
  max_results_per_query: 10
  name: google
  rate_limit_requests_per_minute: 60
  timeout_seconds: 30
- api_endpoint: https://api.bing.microsoft.com/v7.0/search
  api_key: ''
  enabled: true
  max_results_per_query: 10
  name: bing
  rate_limit_requests_per_minute: 60
  timeout_seconds: 30
- api_endpoint: https://duckduckgo.com/html/
  api_key: ''
  enabled: true
  max_results_per_query: 10
  name: duckduckgo
  rate_limit_requests_per_minute: 60
  timeout_seconds: 30
search_terms_templates:
- '"{scale_name}" musical scale'
- '"{scale_name}" music theory'
- '"{scale_name}" scale notes intervals'
- '"{scale_name}" ethnomusicology'
