<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Grading Mode Fix</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #00f3ff;
            padding: 20px;
            line-height: 1.6;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
        }
        .success { border-color: #44ff44; color: #44ff44; }
        .error { border-color: #ff4444; color: #ff4444; }
        .info { border-color: #00f3ff; color: #00f3ff; }
        button {
            background: #333;
            color: #00f3ff;
            border: 1px solid #00f3ff;
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background: #00f3ff;
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    <h1>Grading Mode Propagation Fix Verification</h1>
    
    <div class="test-result info">
        <strong>Testing Simple Word Engine grading mode propagation...</strong>
    </div>
    
    <button onclick="testGradingModes()">Run Test</button>
    <button onclick="clearResults()">Clear</button>
    
    <div id="results"></div>

    <script src="music-theory-engine.js"></script>
    <script src="word-database.js"></script>
    <script src="phonetic-analyzer.js"></script>
    <script src="scale-intelligence-engine.js"></script>
    <script src="simple-word-engine.js"></script>
    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = message;
            results.appendChild(div);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function testGradingModes() {
            clearResults();
            log('🔧 Initializing engines...', 'info');
            
            try {
                // Initialize engines
                const musicTheory = new MusicTheoryEngine();
                const wordDb = new WordDatabase();
                const phoneticAnalyzer = new PhoneticAnalyzer();
                const scaleIntelligence = new ScaleIntelligenceEngine();
                const wordEngine = new SimpleWordEngine(musicTheory);
                
                log('✅ Engines initialized successfully', 'success');
                
                // Test each grading mode
                const modes = ['functional', 'emotional', 'color'];
                const testPhrase = 'chase chaos danger';
                
                for (const mode of modes) {
                    log(`<br>🧪 Testing ${mode} mode...`, 'info');
                    
                    // Set the mode
                    musicTheory.setGradingMode(mode);
                    
                    // Wait a moment for event propagation
                    await new Promise(resolve => setTimeout(resolve, 100));
                    
                    // Check if word engine received the update
                    const engineMode = wordEngine.currentGradingMode;
                    log(`   Music Theory Engine mode: ${musicTheory.gradingMode}`, 'info');
                    log(`   Simple Word Engine mode: ${engineMode}`, 'info');
                    
                    if (engineMode === mode) {
                        log(`   ✅ Mode propagation: SUCCESS`, 'success');
                    } else {
                        log(`   ❌ Mode propagation: FAILED (expected ${mode}, got ${engineMode})`, 'error');
                        continue;
                    }
                    
                    // Test word analysis
                    const result = await wordEngine.translateWords(testPhrase);
                    const reasoning = result.reasoning?.summary || 'No reasoning available';
                    
                    log(`   Analysis result: ${reasoning}`, 'info');
                    
                    // Check if reasoning shows correct mode
                    const modeMatch = reasoning.match(/\((\w+) grading\)/);
                    const reasoningMode = modeMatch ? modeMatch[1] : 'unknown';
                    
                    if (reasoningMode === mode) {
                        log(`   ✅ Reasoning text: SUCCESS (shows "${mode} grading")`, 'success');
                    } else {
                        log(`   ❌ Reasoning text: FAILED (expected "${mode} grading", got "${reasoningMode} grading")`, 'error');
                    }
                }
                
                log('<br>🎯 Test completed!', 'info');
                
            } catch (error) {
                log(`❌ Test failed with error: ${error.message}`, 'error');
                console.error('Test error:', error);
            }
        }
    </script>
</body>
</html>
