<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Progression Builder Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 15px;
            background: #333;
            border-radius: 6px;
        }
        
        .test-title {
            color: #4CAF50;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .progression-display {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }
        
        .chord-item {
            background: #444;
            padding: 8px 12px;
            border-radius: 4px;
            border-left: 3px solid #666;
        }
        
        .chord-name {
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .chord-grade {
            font-size: 0.8em;
            opacity: 0.8;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {
            background: #45a049;
        }
        
        .results {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Enhanced Progression Builder Test</h1>
        
        <div class="test-section">
            <div class="test-title">1. Basic Progression Generation</div>
            <button onclick="testBasicProgression()">Generate Basic Progression</button>
            <div id="basic-results" class="results"></div>
        </div>
        
        <div class="test-section">
            <div class="test-title">2. Grading-Weighted Selection</div>
            <button onclick="testGradingWeighted()">Test Grading Weights</button>
            <div id="grading-results" class="results"></div>
        </div>
        
        <div class="test-section">
            <div class="test-title">3. Alternative Suggestions</div>
            <button onclick="testAlternatives()">Test Alternative Suggestions</button>
            <div id="alternatives-results" class="results"></div>
        </div>
        
        <div class="test-section">
            <div class="test-title">4. Property Test Results</div>
            <button onclick="runPropertyTest()">Run Property Test</button>
            <div id="property-results" class="results"></div>
        </div>
    </div>

    <script src="music-theory-engine.js"></script>
    <script src="progression-builder.js"></script>
    <script src="test-enhanced-grading-property-8.js"></script>
    
    <script>
        function testBasicProgression() {
            const engine = new MusicTheoryEngine();
            const builder = new ProgressionBuilder(engine);
            
            // Set up test state
            builder.state.inputNumbers = [1, 4, 5, 1];
            builder.state.currentKey = 'C';
            builder.state.currentScale = 'major';
            builder.state.gradeTier = 3;
            builder.state.complexity = 70;
            
            // Generate progression
            builder.generateProgression();
            
            const results = document.getElementById('basic-results');
            results.innerHTML = `
                <strong>Generated Progression:</strong><br>
                ${builder.state.currentProgression.join(' - ')}<br><br>
                <strong>Grading Info:</strong><br>
                ${builder.state.progressionMeta.map((m, i) => 
                    `${i+1}. ${builder.state.currentProgression[i]}: Grade ${m.chosenGrade || 'N/A'} ${m.isSubstitution ? '(Sub)' : ''}`
                ).join('<br>')}
            `;
        }
        
        function testGradingWeighted() {
            const engine = new MusicTheoryEngine();
            engine.setGradingMode('functional');
            
            const results = document.getElementById('grading-results');
            let output = '<strong>Testing grading-weighted selection:</strong><br><br>';
            
            // Test different grading tiers
            for (let tier = 0; tier <= 4; tier++) {
                const builder = new ProgressionBuilder(engine);
                builder.state.inputNumbers = [1, 4, 5, 1];
                builder.state.currentKey = 'C';
                builder.state.currentScale = 'major';
                builder.state.gradeTier = tier;
                builder.state.complexity = 50;
                
                builder.generateProgression();
                
                const avgGrade = builder.state.progressionMeta.reduce((sum, m) => 
                    sum + (m.chosenGrade || 0), 0) / builder.state.progressionMeta.length;
                
                output += `Target Tier ${tier}: ${builder.state.currentProgression.join(' - ')} (Avg: ${avgGrade.toFixed(1)})<br>`;
            }
            
            results.innerHTML = output;
        }
        
        function testAlternatives() {
            const engine = new MusicTheoryEngine();
            engine.setGradingMode('functional');
            
            const context = { elementType: 'note', key: 'C', scaleType: 'major' };
            const alternatives = engine.suggestAlternatives('F#', 3, context);
            
            const results = document.getElementById('alternatives-results');
            results.innerHTML = `
                <strong>Alternatives for F# (low-tier note):</strong><br><br>
                ${alternatives.map(alt => 
                    `• ${alt.element} (Tier ${alt.tier}): ${alt.explanation.substring(0, 60)}...`
                ).join('<br>')}
            `;
        }
        
        function runPropertyTest() {
            const test = new AlternativeSuggestionTest('Alternative Suggestion Generation', 50);
            const result = test.run();
            
            const results = document.getElementById('property-results');
            results.innerHTML = `
                <strong>Property Test Results:</strong><br>
                Status: <span style="color: ${result.passed ? '#4CAF50' : '#f44336'}">${result.passed ? 'PASSED' : 'FAILED'}</span><br>
                Duration: ${result.duration}ms<br>
                Iterations: ${result.iterations}<br>
                Failures: ${result.failures.length}<br><br>
                ${result.failures.length > 0 ? 
                    '<strong>Failure Details:</strong><br>' + 
                    result.failures.slice(0, 3).map(f => `• ${f.reason}`).join('<br>') +
                    (result.failures.length > 3 ? '<br>... and more' : '')
                    : '<strong>All tests passed!</strong>'
                }
            `;
        }
        
        // Auto-run basic test on load
        window.addEventListener('load', () => {
            testBasicProgression();
        });
    </script>
</body>
</html>
