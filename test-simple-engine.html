<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Simple Engine</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        .result { margin: 15px 0; padding: 12px; border: 1px solid #333; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🎵 Simple Engine Test</h1>
    <div id="results"></div>

    <script src="music-theory-engine.js"></script>
    <script src="scale-intelligence-engine.js"></script>
    <script src="simple-word-engine.js?v=4"></script>

    <script>
        async function testSimpleEngine() {
            const resultsDiv = document.getElementById('results');
            
            try {
                console.log('Testing Simple Engine...');
                
                // Initialize
                const musicTheory = new MusicTheoryEngine();
                const engine = new SimpleWordEngine(musicTheory);
                
                console.log('Engine initialized:', engine.constructor.name);
                
                // Test cases - especially dangerous words that should get VARIETY of appropriate scales
                const testCases = [
                    'chase woods danger',
                    'chase woods danger', // Test multiple times to see variety
                    'chase woods danger',
                    'chase woods danger',
                    'chase woods danger',
                    'ancient temple',
                    'dark forest mystery',
                    'bright sunshine joy',
                    'mysterious cave ancient'
                ];
                
                let html = '<h2>Scale Intelligence Engine Test Results</h2>';
                
                for (const testWords of testCases) {
                    const result = await engine.translateWords(testWords, {
                        weights: { emotional: 0.30, semantic: 0.25, phonetic: 0.15, archetype: 0.10 }
                    });
                    
                    console.log(`Result for "${testWords}":`, result);
                    
                    // Check if dangerous words got appropriate scales (expanded list)
                    const isDangerous = testWords.includes('danger') || testWords.includes('chase');
                    const appropriateDangerousScales = [
                        'locrian', 'phrygian_dominant', 'phrygian', 'harmonic', 'altered', 
                        'hungarian_minor', 'neapolitan_minor', 'enigmatic', 'octatonic_dim',
                        'whole_tone', 'hijaz', 'persian', 'blues_hexatonic', 'melodic'
                    ];
                    const gotDangerousScale = appropriateDangerousScales.includes(result.scale.name);
                    
                    const scaleAppropriate = isDangerous ? gotDangerousScale : true;
                    const statusColor = scaleAppropriate ? '#4ade80' : '#f87171';
                    
                    html += `
                        <div class="result" style="border-color: ${statusColor};">
                            <h3>"${testWords}" ${isDangerous ? '⚠️ (DANGEROUS)' : ''}</h3>
                            <p><strong>Scale:</strong> ${result.scale.root} ${result.scale.name} 
                               ${isDangerous ? (gotDangerousScale ? '✅ APPROPRIATE' : '❌ TOO BRIGHT') : ''}</p>
                            <p><strong>Intelligence Score:</strong> ${Math.round((result.reasoning.intelligenceScore || 0) * 100)}%</p>
                            <p><strong>Progression:</strong> ${result.progression.map(c => `${c.fullName}`).join(' → ')}</p>
                            <p><strong>Reasoning:</strong> ${result.reasoning.summary}</p>
                            <p><strong>Scale Choice:</strong> ${result.reasoning.scaleChoice}</p>
                            ${result.reasoning.culturalContext ? `<p><strong>Cultural:</strong> ${result.reasoning.culturalContext}</p>` : ''}
                            ${result.reasoning.historicalContext ? `<p><strong>Historical:</strong> ${result.reasoning.historicalContext}</p>` : ''}
                            <details>
                                <summary>Character Analysis</summary>
                                <pre>${JSON.stringify(result.character, null, 2)}</pre>
                            </details>
                            ${result.reasoning.alternatives ? `
                                <details>
                                    <summary>Alternative Scales</summary>
                                    <ul>${result.reasoning.alternatives.map(alt => `<li>${alt.name} (${Math.round(alt.score * 100)}%) - ${alt.reason}</li>`).join('')}</ul>
                                </details>
                            ` : ''}
                        </div>
                    `;
                }
                
                resultsDiv.innerHTML = html;
                
            } catch (error) {
                console.error('Test failed:', error);
                resultsDiv.innerHTML = `<div class="result" style="color: red;">Error: ${error.message}</div>`;
            }
        }
        
        window.addEventListener('DOMContentLoaded', testSimpleEngine);
    </script>
</body>
</html>
