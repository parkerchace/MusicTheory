<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Grading Mode Issue</title>
    <link rel="stylesheet" href="aperture-theme.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-main);
        }
        .debug-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .debug-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
        }
        .debug-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .debug-button {
            padding: 8px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            color: var(--text-main);
            cursor: pointer;
            border-radius: 4px;
            font-family: var(--font-tech);
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .debug-button:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .debug-button.active {
            background: var(--accent-primary);
            color: var(--bg-main);
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 243, 255, 0.1);
            border-left: 3px solid var(--accent-primary);
            font-family: var(--font-tech);
            font-size: 0.9em;
        }
        .debug-output {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.85em;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .debug-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .debug-card {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            border-radius: 4px;
        }
        .debug-card h4 {
            margin-top: 0;
            color: var(--accent-primary);
        }
        .debug-card .value {
            font-weight: bold;
            color: var(--text-main);
        }
        .error {
            color: #ff4444;
        }
        .success {
            color: #44ff44;
        }
        .warning {
            color: #ffaa44;
        }
    </style>
</head>
<body>
    <div class="debug-container">
        <h1>Debug Grading Mode Issue</h1>
        
        <div class="debug-section">
            <h2>Grading Mode Test Controls</h2>
            <div class="debug-controls">
                <button class="debug-button active" id="functional-btn" onclick="testGradingMode('functional')">Test Functional</button>
                <button class="debug-button" id="emotional-btn" onclick="testGradingMode('emotional')">Test Emotional</button>
                <button class="debug-button" id="color-btn" onclick="testGradingMode('color')">Test Color</button>
                <button class="debug-button" onclick="enableDebugLogging()">Enable Debug</button>
                <button class="debug-button" onclick="testAllModes()">Test All Modes</button>
                <button class="debug-button" onclick="clearOutput()">Clear</button>
            </div>
            <div id="status" class="status">Ready to debug grading mode issue...</div>
        </div>

        <div class="debug-section">
            <h2>Engine Status</h2>
            <div class="debug-grid">
                <div class="debug-card">
                    <h4>Music Theory Engine</h4>
                    <div>Mode: <span class="value" id="engine-mode">-</span></div>
                    <div>Instance: <span class="value" id="engine-instance">-</span></div>
                </div>
                <div class="debug-card">
                    <h4>Lexical Engine</h4>
                    <div>Mode: <span class="value" id="lexical-mode">-</span></div>
                    <div>Instance: <span class="value" id="lexical-instance">-</span></div>
                </div>
                <div class="debug-card">
                    <h4>Last Test Result</h4>
                    <div>Expected: <span class="value" id="expected-mode">-</span></div>
                    <div>Actual: <span class="value" id="actual-mode">-</span></div>
                    <div>Status: <span class="value" id="test-status">-</span></div>
                </div>
            </div>
        </div>

        <div class="debug-section">
            <h2>Debug Output</h2>
            <div id="debug-output" class="debug-output">Waiting for test execution...</div>
        </div>
    </div>

    <script src="music-theory-engine.js"></script>
    <script src="word-database.js"></script>
    <script src="phonetic-analyzer.js"></script>
    <script src="lexical-music-engine-v2.js"></script>
    <script>
        let musicTheory, lexicalEngine;
        let debugEnabled = false;

        // Initialize the debug test
        function initDebugTest() {
            try {
                // Initialize music theory engine
                musicTheory = new MusicTheoryEngine();
                
                // Initialize lexical engine
                const wordDb = new WordDatabase();
                const phoneticAnalyzer = new PhoneticAnalyzer();
                lexicalEngine = new LexicalMusicEngine(musicTheory, wordDb, phoneticAnalyzer);

                updateEngineStatus();
                updateStatus('Debug test initialized - ready to test grading modes');
                
                logOutput('=== DEBUG INITIALIZATION ===');
                logOutput(`Music Theory Engine created: ${!!musicTheory}`);
                logOutput(`Lexical Engine created: ${!!lexicalEngine}`);
                logOutput(`Initial grading mode: ${musicTheory.gradingMode}`);
                logOutput('');
                
            } catch (error) {
                updateStatus('Error initializing debug test: ' + error.message);
                console.error('Debug initialization error:', error);
            }
        }

        function testGradingMode(mode) {
            try {
                // Update button states
                document.querySelectorAll('.debug-button').forEach(btn => btn.classList.remove('active'));
                document.getElementById(mode + '-btn').classList.add('active');

                logOutput(`=== TESTING GRADING MODE: ${mode.toUpperCase()} ===`);
                
                // Step 1: Set grading mode
                logOutput(`1. Setting grading mode to: ${mode}`);
                const oldMode = musicTheory.gradingMode;
                musicTheory.setGradingMode(mode);
                const newMode = musicTheory.gradingMode;
                
                logOutput(`   Old mode: ${oldMode}`);
                logOutput(`   New mode: ${newMode}`);
                logOutput(`   Mode change successful: ${newMode === mode}`);
                
                // Step 2: Check lexical engine access
                logOutput(`2. Checking lexical engine access to grading mode:`);
                logOutput(`   lexicalEngine.musicTheory.gradingMode: ${lexicalEngine.musicTheory.gradingMode}`);
                logOutput(`   Same instance: ${lexicalEngine.musicTheory === musicTheory}`);
                
                // Step 3: Test word analysis
                logOutput(`3. Testing word analysis with "${mode}" mode:`);
                const testWord = "exiting new nature";
                
                // Enable debug logging temporarily
                const wasDebugEnabled = lexicalEngine.debug;
                lexicalEngine.debug = debugEnabled;
                
                const result = lexicalEngine.analyzeWords(testWord);
                
                // Restore debug state
                lexicalEngine.debug = wasDebugEnabled;
                
                // Step 4: Analyze results
                const reasoning = result.reasoning ? result.reasoning.summary : 'No reasoning available';
                logOutput(`   Analysis result: ${reasoning}`);
                
                const expectedText = `(${mode} grading)`;
                const actualModeMatch = reasoning.match(/\((\w+) grading\)/);
                const actualMode = actualModeMatch ? actualModeMatch[1] : 'unknown';
                
                logOutput(`   Expected: ${expectedText}`);
                logOutput(`   Actual mode in reasoning: ${actualMode}`);
                
                const success = actualMode === mode;
                logOutput(`   Test result: ${success ? 'SUCCESS' : 'FAILURE'}`);
                
                // Update status displays
                updateEngineStatus();
                document.getElementById('expected-mode').textContent = mode;
                document.getElementById('actual-mode').textContent = actualMode;
                document.getElementById('test-status').textContent = success ? 'PASS' : 'FAIL';
                document.getElementById('test-status').className = 'value ' + (success ? 'success' : 'error');
                
                if (success) {
                    updateStatus(`✅ Grading mode test PASSED: ${mode} mode correctly reflected`);
                } else {
                    updateStatus(`❌ Grading mode test FAILED: Expected ${mode}, got ${actualMode}`);
                }
                
                logOutput('');
                
            } catch (error) {
                updateStatus('Error testing grading mode: ' + error.message);
                logOutput(`ERROR: ${error.message}`);
                console.error('Grading mode test error:', error);
            }
        }

        function enableDebugLogging() {
            debugEnabled = !debugEnabled;
            if (lexicalEngine) {
                lexicalEngine.debug = debugEnabled;
            }
            updateStatus(`Debug logging ${debugEnabled ? 'enabled' : 'disabled'}`);
            logOutput(`Debug logging ${debugEnabled ? 'ENABLED' : 'DISABLED'}`);
        }

        function testAllModes() {
            logOutput('=== TESTING ALL GRADING MODES ===');
            const modes = ['functional', 'emotional', 'color'];
            
            modes.forEach((mode, index) => {
                setTimeout(() => {
                    testGradingMode(mode);
                    if (index === modes.length - 1) {
                        logOutput('=== ALL MODES TESTED ===');
                    }
                }, index * 1000);
            });
        }

        function updateEngineStatus() {
            try {
                document.getElementById('engine-mode').textContent = musicTheory.gradingMode || 'Unknown';
                document.getElementById('engine-instance').textContent = musicTheory ? 'Created' : 'Missing';
                document.getElementById('lexical-mode').textContent = lexicalEngine?.musicTheory?.gradingMode || 'Unknown';
                document.getElementById('lexical-instance').textContent = lexicalEngine ? 'Created' : 'Missing';
            } catch (error) {
                console.error('Error updating engine status:', error);
            }
        }

        function logOutput(text) {
            const output = document.getElementById('debug-output');
            if (output.textContent === 'Waiting for test execution...') {
                output.textContent = '';
            }
            output.textContent += text + '\n';
            output.scrollTop = output.scrollHeight;
        }

        function clearOutput() {
            document.getElementById('debug-output').textContent = 'Waiting for test execution...';
            updateStatus('Debug output cleared');
        }

        function updateStatus(message) {
            const status = document.getElementById('status');
            status.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initDebugTest);
    </script>
</body>
</html>
