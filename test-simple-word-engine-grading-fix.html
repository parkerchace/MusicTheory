<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Word Engine Grading Fix Test</title>
    <link rel="stylesheet" href="aperture-theme.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-main);
        }
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
        }
        .test-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .test-button {
            padding: 8px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            color: var(--text-main);
            cursor: pointer;
            border-radius: 4px;
            font-family: var(--font-tech);
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .test-button:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .test-button.active {
            background: var(--accent-primary);
            color: var(--bg-main);
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 243, 255, 0.1);
            border-left: 3px solid var(--accent-primary);
            font-family: var(--font-tech);
            font-size: 0.9em;
        }
        .test-output {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.85em;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .test-card {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            border-radius: 4px;
        }
        .test-card h4 {
            margin-top: 0;
            color: var(--accent-primary);
        }
        .test-card .value {
            font-weight: bold;
            color: var(--text-main);
        }
        .success {
            color: #44ff44;
        }
        .error {
            color: #ff4444;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Simple Word Engine Grading Fix Test</h1>
        
        <div class="test-section">
            <h2>Grading Mode Test Controls</h2>
            <div class="test-controls">
                <button class="test-button active" id="functional-btn" onclick="testGradingMode('functional')">Test Functional</button>
                <button class="test-button" id="emotional-btn" onclick="testGradingMode('emotional')">Test Emotional</button>
                <button class="test-button" id="color-btn" onclick="testGradingMode('color')">Test Color</button>
                <button class="test-button" onclick="testAllModes()">Test All Modes</button>
                <button class="test-button" onclick="clearOutput()">Clear</button>
            </div>
            <div id="status" class="status">Ready to test Simple Word Engine grading mode fix...</div>
        </div>

        <div class="test-section">
            <h2>Engine Status</h2>
            <div class="test-grid">
                <div class="test-card">
                    <h4>Music Theory Engine</h4>
                    <div>Mode: <span class="value" id="engine-mode">-</span></div>
                </div>
                <div class="test-card">
                    <h4>Simple Word Engine</h4>
                    <div>Mode: <span class="value" id="word-engine-mode">-</span></div>
                </div>
                <div class="test-card">
                    <h4>Last Test Result</h4>
                    <div>Expected: <span class="value" id="expected-mode">-</span></div>
                    <div>Actual: <span class="value" id="actual-mode">-</span></div>
                    <div>Status: <span class="value" id="test-status">-</span></div>
                </div>
            </div>
        </div>

        <div class="test-section">
            <h2>Test Output</h2>
            <div id="test-output" class="test-output">Waiting for test execution...</div>
        </div>
    </div>

    <script src="music-theory-engine.js"></script>
    <script src="word-database.js"></script>
    <script src="phonetic-analyzer.js"></script>
    <script src="scale-intelligence-engine.js"></script>
    <script src="simple-word-engine.js"></script>
    <script>
        let musicTheory, wordEngine;

        // Initialize the test
        function initTest() {
            try {
                // Initialize music theory engine
                musicTheory = new MusicTheoryEngine();
                
                // Initialize word engine with scale intelligence
                const wordDb = new WordDatabase();
                const phoneticAnalyzer = new PhoneticAnalyzer();
                const scaleIntelligence = new ScaleIntelligenceEngine(musicTheory);
                
                wordEngine = new SimpleWordEngine(musicTheory, wordDb, phoneticAnalyzer, scaleIntelligence);

                updateEngineStatus();
                updateStatus('Simple Word Engine grading fix test initialized');
                
                logOutput('=== SIMPLE WORD ENGINE GRADING FIX TEST ===');
                logOutput(`Music Theory Engine created: ${!!musicTheory}`);
                logOutput(`Simple Word Engine created: ${!!wordEngine}`);
                logOutput(`Initial grading mode: ${musicTheory.gradingMode}`);
                logOutput(`Word engine grading mode: ${wordEngine.currentGradingMode}`);
                logOutput('');
                
            } catch (error) {
                updateStatus('Error initializing test: ' + error.message);
                console.error('Test initialization error:', error);
            }
        }

        function testGradingMode(mode) {
            try {
                // Update button states
                document.querySelectorAll('.test-button').forEach(btn => btn.classList.remove('active'));
                document.getElementById(mode + '-btn').classList.add('active');

                logOutput(`=== TESTING GRADING MODE: ${mode.toUpperCase()} ===`);
                
                // Step 1: Set grading mode
                logOutput(`1. Setting grading mode to: ${mode}`);
                const oldMode = musicTheory.gradingMode;
                musicTheory.setGradingMode(mode);
                const newMode = musicTheory.gradingMode;
                
                logOutput(`   Old mode: ${oldMode}`);
                logOutput(`   New mode: ${newMode}`);
                logOutput(`   Mode change successful: ${newMode === mode}`);
                
                // Step 2: Check word engine mode after change
                logOutput(`2. Checking word engine grading mode after change:`);
                logOutput(`   wordEngine.currentGradingMode: ${wordEngine.currentGradingMode}`);
                
                // Step 3: Test word analysis
                logOutput(`3. Testing word analysis with "${mode}" mode:`);
                const testPhrase = "chase chaos danger";
                
                const result = wordEngine.translateWords(testPhrase);
                
                // Step 4: Analyze results
                const reasoning = result.reasoning ? result.reasoning.summary : 'No reasoning available';
                logOutput(`   Analysis result: ${reasoning}`);
                
                const expectedText = `(${mode} grading)`;
                const actualModeMatch = reasoning.match(/\((\w+) grading\)/);
                const actualMode = actualModeMatch ? actualModeMatch[1] : 'unknown';
                
                logOutput(`   Expected: ${expectedText}`);
                logOutput(`   Actual mode in reasoning: ${actualMode}`);
                
                const success = actualMode === mode;
                logOutput(`   Test result: ${success ? 'SUCCESS' : 'FAILURE'}`);
                
                // Update status displays
                updateEngineStatus();
                document.getElementById('expected-mode').textContent = mode;
                document.getElementById('actual-mode').textContent = actualMode;
                document.getElementById('test-status').textContent = success ? 'PASS' : 'FAIL';
                document.getElementById('test-status').className = 'value ' + (success ? 'success' : 'error');
                
                if (success) {
                    updateStatus(`✅ Grading mode test PASSED: ${mode} mode correctly reflected`);
                } else {
                    updateStatus(`❌ Grading mode test FAILED: Expected ${mode}, got ${actualMode}`);
                }
                
                logOutput('');
                
            } catch (error) {
                updateStatus('Error testing grading mode: ' + error.message);
                logOutput(`ERROR: ${error.message}`);
                console.error('Grading mode test error:', error);
            }
        }

        function testAllModes() {
            logOutput('=== TESTING ALL GRADING MODES ===');
            const modes = ['functional', 'emotional', 'color'];
            
            modes.forEach((mode, index) => {
                setTimeout(() => {
                    testGradingMode(mode);
                    if (index === modes.length - 1) {
                        logOutput('=== ALL MODES TESTED ===');
                    }
                }, index * 2000);
            });
        }

        function updateEngineStatus() {
            try {
                document.getElementById('engine-mode').textContent = musicTheory.gradingMode || 'Unknown';
                document.getElementById('word-engine-mode').textContent = wordEngine?.currentGradingMode || 'Unknown';
            } catch (error) {
                console.error('Error updating engine status:', error);
            }
        }

        function logOutput(text) {
            const output = document.getElementById('test-output');
            if (output.textContent === 'Waiting for test execution...') {
                output.textContent = '';
            }
            output.textContent += text + '\n';
            output.scrollTop = output.scrollHeight;
        }

        function clearOutput() {
            document.getElementById('test-output').textContent = 'Waiting for test execution...';
            updateStatus('Test output cleared');
        }

        function updateStatus(message) {
            const status = document.getElementById('status');
            status.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initTest);
    </script>
</body>
</html>
