<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Generative System Improvements</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        .test-result { margin: 15px 0; padding: 12px; border: 1px solid #333; border-radius: 5px; }
        .test-word { color: #60a5fa; font-weight: bold; font-size: 1.1em; }
        .test-scale { color: #34d399; }
        .test-progression { color: #fbbf24; }
        .test-reasoning { color: #e879f9; font-style: italic; }
        .test-attributes { color: #fb923c; font-size: 0.9em; }
        .test-run { margin: 30px 0; padding: 20px; border: 2px solid #555; border-radius: 8px; }
        .run-header { color: #fff; font-size: 1.2em; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>🎵 Generative System Improvements Test</h1>
    <p>Testing the same words multiple times to verify variety...</p>
    <div id="results"></div>

    <script src="music-theory-engine.js"></script>
    <script src="word-database.js"></script>
    <script src="phonetic-analyzer.js"></script>
    <script src="chord-attribute-engine.js"></script>
    <script src="semantic-api-engine.js"></script>
    <script src="voice-leading-engine.js"></script>
    <script src="generative-word-mapper.js"></script>
    <script src="lexical-music-engine-v2.js"></script>

    <script>
        async function testGenerativeVariety() {
            const resultsDiv = document.getElementById('results');
            
            try {
                // Initialize engines
                const musicTheory = new MusicTheoryEngine();
                const wordDB = new WordDatabase();
                const lexicalEngine = new LexicalMusicEngineV2(musicTheory, wordDB);
                
                // Test the same words multiple times to see variety
                const testWords = [
                    'insane melon',
                    'ancient medieval',
                    'forever',
                    'cosmic divine'
                ];
                
                resultsDiv.innerHTML = '<h2>Testing generative system variety...</h2>';
                
                for (const words of testWords) {
                    const runDiv = document.createElement('div');
                    runDiv.className = 'test-run';
                    runDiv.innerHTML = `<div class="run-header">Testing: "${words}" (3 runs)</div>`;
                    
                    // Run the same word 3 times to see variety
                    for (let run = 1; run <= 3; run++) {
                        try {
                            const result = await lexicalEngine.translateWords(words);
                            
                            const div = document.createElement('div');
                            div.className = 'test-result';
                            
                            div.innerHTML = `
                                <div class="test-word">Run ${run}: "${words}"</div>
                                <div class="test-scale">Scale: ${result.scale.root} ${result.scale.name}</div>
                                <div class="test-progression">Progression: ${result.progression.map(c => `${c.fullName} (${c.degree})`).join(' → ')}</div>
                                <div class="test-reasoning">Reasoning: ${result.reasoning?.summary || 'No reasoning available'}</div>
                                ${result.reasoning?.blended ? `<div class="test-attributes">Attributes: brightness=${result.reasoning.blended.brightness?.toFixed(2)}, tension=${result.reasoning.blended.tension?.toFixed(2)}, movement=${result.reasoning.blended.movement?.toFixed(2)}</div>` : ''}
                            `;
                            
                            runDiv.appendChild(div);
                            
                        } catch (error) {
                            const div = document.createElement('div');
                            div.className = 'test-result';
                            div.style.borderColor = '#ef4444';
                            div.innerHTML = `
                                <div class="test-word">Run ${run}: "${words}" - ERROR</div>
                                <div style="color: #ef4444;">${error.message}</div>
                            `;
                            runDiv.appendChild(div);
                        }
                    }
                    
                    resultsDiv.appendChild(runDiv);
                    
                    // Add small delay to see results appear
                    await new Promise(resolve => setTimeout(resolve, 200));
                }
                
                resultsDiv.innerHTML += '<h2>✅ Variety test completed!</h2><p>Check if different runs produce different scales, roots, and progressions.</p>';
                
            } catch (error) {
                resultsDiv.innerHTML = `<div style="color: #ef4444;">Failed to initialize: ${error.message}</div>`;
            }
        }
        
        // Run test when page loads
        window.addEventListener('DOMContentLoaded', testGenerativeVariety);
    </script>
</body>
</html>
