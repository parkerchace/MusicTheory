<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale Library UI Update Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #1a1a1a;
            color: #ffffff;
        }
        
        :root {
            --accent-primary: #60a5fa;
            --accent-secondary: #34d399;
            --text-main: #ffffff;
            --text-muted: #d4d4d8;
            --border-light: #52525b;
            --font-tech: 'Courier New', monospace;
        }
        
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #333;
            border-radius: 4px;
        }
        
        h1, h2 {
            color: var(--accent-primary);
        }
        
        .result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        
        .pass {
            background: rgba(52, 211, 153, 0.2);
            border-left: 4px solid #34d399;
        }
        
        .fail {
            background: rgba(239, 68, 68, 0.2);
            border-left: 4px solid #ef4444;
        }
        
        #scale-library-container {
            margin: 20px 0;
            padding: 20px;
            background: #1e1e1e;
            border: 1px solid var(--border-light);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Scale Library UI Update Test</h1>
        <p>Testing the updated scale library UI with regional categories and enhanced citations.</p>
        
        <div class="test-section">
            <h2>Scale Library Component</h2>
            <div id="scale-library-container"></div>
        </div>
        
        <div class="test-section">
            <h2>Test Results</h2>
            <div id="test-results"></div>
        </div>
    </div>

    <script src="music-theory-engine.js"></script>
    <script src="citation-manager.js"></script>
    <script src="regional-scale-manager.js"></script>
    <script src="scale-library.js"></script>
    
    <script>
        function runTests() {
            const results = [];
            
            try {
                // Initialize components
                const musicEngine = new MusicTheoryEngine();
                const scaleLibrary = new ScaleLibrary(musicEngine);
                
                // Test 1: Verify regional categories are present
                console.log('🧪 Test 1: Regional categories presence');
                const categories = musicEngine.getScaleCategories();
                const hasNewCategories = categories['🌎 South American Scales'] && categories['🌍 African Scales'];
                results.push({
                    name: 'Regional Categories Present',
                    passed: hasNewCategories,
                    details: hasNewCategories ? 
                        `Found ${categories['🌎 South American Scales'].length} South American and ${categories['🌍 African Scales'].length} African scales` :
                        'Missing regional categories'
                });
                
                // Test 2: Verify existing categories are preserved
                console.log('🧪 Test 2: Existing categories preservation');
                const expectedCategories = ['🎵 Major Scale & Modes', '🎼 Melodic Minor & Modes', '🎹 Harmonic Minor & Modes'];
                const existingPreserved = expectedCategories.every(cat => categories[cat]);
                results.push({
                    name: 'Existing Categories Preserved',
                    passed: existingPreserved,
                    details: existingPreserved ? 'All expected existing categories found' : 'Some existing categories missing'
                });
                
                // Test 3: Mount scale library and verify UI
                console.log('🧪 Test 3: UI mounting and rendering');
                scaleLibrary.mount('#scale-library-container');
                
                // Check if UI elements are present
                const keySelect = document.getElementById('key-select');
                const scaleSelect = document.getElementById('scale-select');
                const uiMounted = keySelect && scaleSelect;
                results.push({
                    name: 'UI Components Mounted',
                    passed: uiMounted,
                    details: uiMounted ? 'Key and scale selectors found' : 'UI components missing'
                });
                
                // Test 4: Verify optgroups for regional scales
                if (scaleSelect) {
                    console.log('🧪 Test 4: Regional scale optgroups');
                    const optgroups = scaleSelect.querySelectorAll('optgroup');
                    const regionalOptgroups = Array.from(optgroups).filter(og => 
                        og.label.includes('South American') || og.label.includes('African')
                    );
                    results.push({
                        name: 'Regional Scale Optgroups',
                        passed: regionalOptgroups.length >= 2,
                        details: `Found ${regionalOptgroups.length} regional optgroups`
                    });
                }
                
                // Test 5: Test scale selection functionality
                console.log('🧪 Test 5: Scale selection functionality');
                try {
                    scaleLibrary.setKeyAndScale('C', 'major');
                    const currentScale = scaleLibrary.getCurrentScale();
                    const currentKey = scaleLibrary.getCurrentKey();
                    const selectionWorks = currentScale === 'major' && currentKey === 'C';
                    results.push({
                        name: 'Scale Selection Functionality',
                        passed: selectionWorks,
                        details: selectionWorks ? `Successfully set to ${currentKey} ${currentScale}` : 'Scale selection failed'
                    });
                } catch (error) {
                    results.push({
                        name: 'Scale Selection Functionality',
                        passed: false,
                        details: `Error: ${error.message}`
                    });
                }
                
                // Test 6: Test regional scale selection
                console.log('🧪 Test 6: Regional scale selection');
                try {
                    // Try to select a South American scale
                    const southAmericanScales = categories['🌎 South American Scales'];
                    if (southAmericanScales && southAmericanScales.length > 0) {
                        const testScale = southAmericanScales[0];
                        scaleLibrary.setKeyAndScale('C', testScale);
                        const selectedScale = scaleLibrary.getCurrentScale();
                        const regionalSelectionWorks = selectedScale === testScale;
                        results.push({
                            name: 'Regional Scale Selection',
                            passed: regionalSelectionWorks,
                            details: regionalSelectionWorks ? `Successfully selected ${testScale}` : `Failed to select ${testScale}`
                        });
                    } else {
                        results.push({
                            name: 'Regional Scale Selection',
                            passed: false,
                            details: 'No South American scales available for testing'
                        });
                    }
                } catch (error) {
                    results.push({
                        name: 'Regional Scale Selection',
                        passed: false,
                        details: `Error: ${error.message}`
                    });
                }
                
                // Test 7: Verify citation display (if available)
                console.log('🧪 Test 7: Citation display');
                const citationElement = document.querySelector('.scale-citation');
                const hasCitationDisplay = citationElement !== null;
                results.push({
                    name: 'Citation Display',
                    passed: hasCitationDisplay,
                    details: hasCitationDisplay ? 'Citation display element found' : 'Citation display not implemented or no citation available'
                });
                
            } catch (error) {
                results.push({
                    name: 'Test Execution',
                    passed: false,
                    details: `Test execution failed: ${error.message}`
                });
            }
            
            // Display results
            const resultsContainer = document.getElementById('test-results');
            resultsContainer.innerHTML = results.map(result => `
                <div class="result ${result.passed ? 'pass' : 'fail'}">
                    <strong>${result.passed ? '✅' : '❌'} ${result.name}</strong><br>
                    ${result.details}
                </div>
            `).join('');
            
            // Summary
            const passedCount = results.filter(r => r.passed).length;
            const totalCount = results.length;
            console.log(`\n📊 Test Summary: ${passedCount}/${totalCount} tests passed`);
            
            return passedCount === totalCount;
        }
        
        // Run tests when page loads
        window.addEventListener('load', () => {
            setTimeout(runTests, 100); // Small delay to ensure all scripts are loaded
        });
    </script>
</body>
</html>
