<!DOCTYPE html>
<html>
<head>
    <title>Advanced Word-to-Music: Real-Time Semantics + Voice Leading</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1600px;
            margin: 20px auto;
            padding: 20px;
            background: #0a0a0a;
            color: #e0e0e0;
        }
        .container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
        }
        h1 { color: #4CAF50; border-bottom: 2px solid #333; padding-bottom: 10px; }
        h2 { color: #64B5F6; margin-top: 0; }
        input { width: 100%; padding: 15px; font-size: 18px; border: 2px solid #333; border-radius: 4px; background: #0a0a0a; color: #e0e0e0; margin-bottom: 20px; }
        button { padding: 12px 30px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #45a049; }
        button:disabled { background: #555; cursor: not-allowed; }
        .section { background: #222; border: 1px solid #333; border-radius: 4px; padding: 20px; margin-bottom: 20px; }
        .chord { display: inline-block; background: #2196F3; color: white; padding: 10px 15px; margin: 5px; border-radius: 4px; font-weight: bold; }
        .voice-leading { background: #1a1a1a; padding: 15px; border-radius: 4px; margin-top: 10px; }
        .voice { margin: 8px 0; padding: 8px; background: #2a2a2a; border-radius: 4px; }
        .movement { color: #81C784; font-family: monospace; }
        .api-status { padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .api-online { background: #1B5E20; color: #A5D6A7; }
        .api-offline { background: #B71C1C; color: #EF9A9A; }
        .definition { background: #2a2a2a; padding: 10px; margin: 5px 0; border-left: 3px solid #FFB74D; border-radius: 4px; }
        .loading { color: #FFB74D; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #2a2a2a; color: #FFB74D; }
        .interval-up { color: #81C784; }
        .interval-down { color: #EF5350; }
        .interval-static { color: #757575; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Advanced Word-to-Music System</h1>
        <p><strong>Real-Time Semantic Analysis</strong> + <strong>Intelligent Voice Leading</strong></p>
        <p>No hardcoded word lists - pulls definitions from Dictionary API, emotional associations from ConceptNet</p>
        
        <div id="apiStatus" class="api-status api-offline">
            ⚠️ Semantic API: Not tested yet
        </div>

        <input type="text" id="wordInput" placeholder="Type any word... (e.g., 'serenity', 'chaos', 'euphoria')" value="serenity">
        <button onclick="analyzeAdvanced()" id="analyzeBtn">Analyze with Real-Time Semantics</button>
        <button onclick="analyzeFallback()">Use Pattern Fallback</button>
    </div>

    <div id="results"></div>

    <script src="music-theory-engine.js"></script>
    <script src="phonetic-analyzer.js"></script>
    <script src="chord-attribute-engine.js"></script>
    <script src="semantic-api-engine.js"></script>
    <script src="voice-leading-engine.js"></script>
    <script src="generative-word-mapper.js"></script>

    <script>
        // Initialize system
        const musicTheory = new MusicTheoryEngine();
        const phonetic = new PhoneticAnalyzer();
        const chordAttrs = new ChordAttributeEngine();
        const semanticAPI = new SemanticAPIEngine();
        const voiceLeading = new VoiceLeadingEngine(musicTheory);

        const mapper = new GenerativeWordMapper(phonetic, chordAttrs, musicTheory, {
            semanticAPI: semanticAPI,
            voiceLeading: voiceLeading,
            useRealTimeSemantics: true
        });

        async function analyzeAdvanced() {
            const word = document.getElementById('wordInput').value.trim();
            if (!word) return;

            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.textContent = 'Analyzing...';

            try {
                const result = await mapper.mapWord(word);
                displayAdvancedResults(result);
                updateAPIStatus(true);
            } catch (error) {
                console.error('Analysis failed:', error);
                document.getElementById('results').innerHTML = `
                    <div class="container">
                        <h2 style="color: #EF5350;">❌ Analysis Failed</h2>
                        <p>${error.message}</p>
                        <p>Try using Pattern Fallback button instead.</p>
                    </div>
                `;
                updateAPIStatus(false);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Analyze with Real-Time Semantics';
            }
        }

        async function analyzeFallback() {
            const word = document.getElementById('wordInput').value.trim();
            if (!word) return;

            // Temporarily disable API
            const tempMapper = new GenerativeWordMapper(phonetic, chordAttrs, musicTheory, {
                semanticAPI: null,
                voiceLeading: voiceLeading,
                useRealTimeSemantics: false
            });

            const result = await tempMapper.mapWord(word);
            displayAdvancedResults(result);
        }

        function updateAPIStatus(online) {
            const status = document.getElementById('apiStatus');
            if (online) {
                status.className = 'api-status api-online';
                status.textContent = '✅ Semantic API: Online and working';
            } else {
                status.className = 'api-status api-offline';
                status.textContent = '⚠️ Semantic API: Unavailable (using pattern fallback)';
            }
        }

        function displayAdvancedResults(result) {
            const html = `
                <div class="container">
                    <h1>Analysis: "${result.word}"</h1>

                    ${result.semantic.source === 'api' ? `
                    <div class="section">
                        <h2>📚 Real-Time Definitions (from Dictionary API)</h2>
                        ${result.semantic.definitions.map(def => 
                            `<div class="definition">${def}</div>`
                        ).join('')}
                    </div>
                    ` : `
                    <div class="section">
                        <h2>📝 Pattern-Based Inference</h2>
                        <p>Using fallback pattern matching (API unavailable or disabled)</p>
                    </div>
                    `}

                    <div class="section">
                        <h2>💭 Semantic Analysis</h2>
                        <p><strong>Source:</strong> ${result.semantic.source === 'api' ? 'Real-time API' : 'Pattern matching'}</p>
                        <p><strong>Emotional Valence:</strong> ${result.semantic.emotional.valence.toFixed(2)} 
                           ${result.semantic.emotional.valence > 0 ? '(positive)' : result.semantic.emotional.valence < 0 ? '(negative)' : '(neutral)'}</p>
                        <p><strong>Arousal:</strong> ${result.semantic.emotional.arousal.toFixed(2)} 
                           ${result.semantic.emotional.arousal > 0 ? '(energetic)' : result.semantic.emotional.arousal < 0 ? '(calm)' : '(neutral)'}</p>
                        <p><strong>Intensity:</strong> ${(result.semantic.intensity * 100).toFixed(0)}%</p>
                        <p><strong>Movement:</strong> ${(result.semantic.movement * 100).toFixed(0)}%</p>
                        <p><strong>Context:</strong> ${result.semantic.contextual.join(', ') || 'none'}</p>
                    </div>

                    <div class="section">
                        <h2>🎶 Generated Progression</h2>
                        <p><strong>Scale:</strong> ${result.scale.root} ${result.scale.name}</p>
                        <div>
                            ${result.progression.map(chord => 
                                `<span class="chord">${chord.symbol}</span>`
                            ).join(' → ')}
                        </div>
                    </div>

                    ${result.voiceLeading ? `
                    <div class="section">
                        <h2>🎹 Voice Leading Analysis</h2>
                        <p>Each chord is voiced with proper voice leading - minimal movement, common tones retained</p>
                        ${result.voiceLeading.map((voicing, i) => `
                            <div class="voice-leading">
                                <h3 style="color: #FFB74D; margin-top: 0;">${voicing.chord}</h3>
                                <div class="voice"><strong>Soprano:</strong> ${midiToNote(voicing.voices.soprano)} <span class="movement">${formatMovement(voicing.movement, 'soprano')}</span></div>
                                <div class="voice"><strong>Alto:</strong> ${midiToNote(voicing.voices.alto)} <span class="movement">${formatMovement(voicing.movement, 'alto')}</span></div>
                                <div class="voice"><strong>Tenor:</strong> ${midiToNote(voicing.voices.tenor)} <span class="movement">${formatMovement(voicing.movement, 'tenor')}</span></div>
                                <div class="voice"><strong>Bass:</strong> ${midiToNote(voicing.voices.bass)} <span class="movement">${formatMovement(voicing.movement, 'bass')}</span></div>
                                ${voicing.movement ? `
                                <p style="margin-top: 10px;">
                                    <strong>Total Movement:</strong> ${voicing.movement.totalSemitones} semitones 
                                    ${voicing.movement.efficient ? '✅ Efficient' : '⚠️ Large leaps'}
                                </p>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>

                    <div class="section">
                        <h2>📊 Voice Movement Table</h2>
                        <table>
                            <thead>
                                <tr>
                                    <th>Chord</th>
                                    <th>Soprano</th>
                                    <th>Alto</th>
                                    <th>Tenor</th>
                                    <th>Bass</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${result.voiceLeading.map(v => `
                                    <tr>
                                        <td><strong>${v.chord}</strong></td>
                                        <td>${midiToNote(v.voices.soprano)}</td>
                                        <td>${midiToNote(v.voices.alto)}</td>
                                        <td>${midiToNote(v.voices.tenor)}</td>
                                        <td>${midiToNote(v.voices.bass)}</td>
                                        <td>${v.movement ? v.movement.totalSemitones + ' st' : '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    ` : ''}

                    <div class="section">
                        <h2>📝 Reasoning</h2>
                        <p>${result.reasoning.summary}</p>
                    </div>
                </div>
            `;
            document.getElementById('results').innerHTML = html;
        }

        function midiToNote(midi) {
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const octave = Math.floor(midi / 12) - 1;
            const note = notes[midi % 12];
            return `${note}${octave}`;
        }

        function formatMovement(movement, voice) {
            if (!movement || !movement.byVoice[voice]) return '';
            const m = movement.byVoice[voice];
            if (m.direction === 'static') {
                return '<span class="interval-static">(held)</span>';
            }
            const arrow = m.direction === 'up' ? '↑' : '↓';
            const className = m.direction === 'up' ? 'interval-up' : 'interval-down';
            return `<span class="${className}">${arrow} ${m.semitones}st</span>`;
        }

        // Test API on load
        window.addEventListener('load', async () => {
            try {
                await semanticAPI.analyzeWord('test');
                updateAPIStatus(true);
            } catch (error) {
                updateAPIStatus(false);
            }
        });
    </script>
</body>
</html>
