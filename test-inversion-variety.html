<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversion Variety Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        
        .test-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 15px;
            background: #333;
            border-radius: 6px;
        }
        
        .test-title {
            color: #4CAF50;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {
            background: #45a049;
        }
        
        .results {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-family: monospace;
        }
        
        #sheet-container {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            margin-top: 10px;
            min-height: 300px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Inversion Variety Test</h1>
        
        <div class="test-section">
            <div class="test-title">Test Repeated Chord Inversions</div>
            <p>This test creates a progression with repeated chords to verify that the sheet music generator varies inversions automatically.</p>
            
            <button onclick="testRepeatedChords()">Test Repeated F7sus4 Chords</button>
            <button onclick="testMixedProgression()">Test Mixed Progression</button>
            <button onclick="regenerateSheet()">Regenerate (New Inversions)</button>
            
            <div id="results" class="results"></div>
            
            <div id="sheet-container"></div>
        </div>
    </div>

    <script src="music-theory-engine.js"></script>
    <script src="sheet-music-generator.js"></script>
    
    <script>
        let sheetGenerator;
        let currentProgression = [];
        
        function initializeSheet() {
            const engine = new MusicTheoryEngine();
            sheetGenerator = new SheetMusicGenerator(engine);
            
            // Configure for per-bar mode to show progression
            sheetGenerator.state.barMode = 'per-bar';
            sheetGenerator.state.staffType = 'grand';
            sheetGenerator.state.key = 'F';
            sheetGenerator.state.scale = 'minor';
            
            // Mount to container
            sheetGenerator.mount('#sheet-container');
        }
        
        function testRepeatedChords() {
            // Create progression similar to your example: F7sus4 repeated multiple times
            const engine = new MusicTheoryEngine();
            
            currentProgression = [
                { root: 'F', chordType: '7sus4', fullName: 'F7sus4', chordNotes: ['F', 'Bb', 'C', 'Eb'] },
                { root: 'Eb', chordType: 'sus4', fullName: 'Ebsus4(add6, no5)', chordNotes: ['Eb', 'Ab', 'C'] },
                { root: 'F', chordType: '7sus4', fullName: 'F7sus4', chordNotes: ['F', 'Bb', 'C', 'Eb'] },
                { root: 'C', chordType: '7sus4', fullName: 'C7sus4', chordNotes: ['C', 'F', 'G', 'Bb'] },
                { root: 'F', chordType: '7sus4', fullName: 'F7sus4', chordNotes: ['F', 'Bb', 'C', 'Eb'] }
            ];
            
            sheetGenerator.setBarChords(currentProgression);
            
            document.getElementById('results').innerHTML = `
                <strong>Test: Repeated F7sus4 Chords</strong><br>
                Progression: ${currentProgression.map(c => c.fullName).join(' - ')}<br>
                <br>
                <strong>Expected:</strong> F7sus4 chords should appear with different inversions<br>
                <strong>Look for:</strong> Inversion labels like "(1st inv)", "(2nd inv)", "(3rd inv)" on repeated chords<br>
                <strong>Voice Leading:</strong> Notes should move smoothly between chords
            `;
        }
        
        function testMixedProgression() {
            // Create a progression with some repeated chords mixed with unique ones
            currentProgression = [
                { root: 'C', chordType: 'maj7', fullName: 'Cmaj7', chordNotes: ['C', 'E', 'G', 'B'] },
                { root: 'F', chordType: 'maj7', fullName: 'Fmaj7', chordNotes: ['F', 'A', 'C', 'E'] },
                { root: 'C', chordType: 'maj7', fullName: 'Cmaj7', chordNotes: ['C', 'E', 'G', 'B'] },
                { root: 'G', chordType: '7', fullName: 'G7', chordNotes: ['G', 'B', 'D', 'F'] },
                { root: 'C', chordType: 'maj7', fullName: 'Cmaj7', chordNotes: ['C', 'E', 'G', 'B'] },
                { root: 'F', chordType: 'maj7', fullName: 'Fmaj7', chordNotes: ['F', 'A', 'C', 'E'] }
            ];
            
            sheetGenerator.setBarChords(currentProgression);
            
            document.getElementById('results').innerHTML = `
                <strong>Test: Mixed Progression with Repeated Chords</strong><br>
                Progression: ${currentProgression.map(c => c.fullName).join(' - ')}<br>
                <br>
                <strong>Expected:</strong> Cmaj7 and Fmaj7 should appear with varied inversions when repeated<br>
                <strong>Pattern:</strong> Should follow inversion pattern (Root → 1st → 2nd → 1st → ...)<br>
                <strong>Randomness:</strong> Some variation from the pattern for musical interest
            `;
        }
        
        function regenerateSheet() {
            if (currentProgression.length > 0) {
                // Force regeneration by setting the progression again
                // This will trigger new random inversion choices
                sheetGenerator.setBarChords([...currentProgression]);
                
                document.getElementById('results').innerHTML += `<br><br><strong>Regenerated:</strong> New inversion choices applied`;
            } else {
                document.getElementById('results').innerHTML = 'No progression loaded. Run a test first.';
            }
        }
        
        // Initialize on load
        window.addEventListener('load', () => {
            initializeSheet();
            testRepeatedChords(); // Auto-run the first test
        });
    </script>
</body>
</html>
