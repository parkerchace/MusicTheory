<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading Mode Propagation Test</title>
    <link rel="stylesheet" href="aperture-theme.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-main);
        }
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
        }
        .test-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .test-button {
            padding: 8px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            color: var(--text-main);
            cursor: pointer;
            border-radius: 4px;
            font-family: var(--font-tech);
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .test-button:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .test-button.active {
            background: var(--accent-primary);
            color: var(--bg-main);
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 243, 255, 0.1);
            border-left: 3px solid var(--accent-primary);
            font-family: var(--font-tech);
            font-size: 0.9em;
        }
        .log-output {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.85em;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .grading-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .grading-card {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            border-radius: 4px;
        }
        .grading-card h4 {
            margin-top: 0;
            color: var(--accent-primary);
        }
        .grading-card .value {
            font-weight: bold;
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Grading Mode Propagation Test</h1>
        
        <div class="test-section">
            <h2>Grading Mode Controls</h2>
            <div class="test-controls">
                <button class="test-button active" id="functional-btn" onclick="setGradingMode('functional')">Functional</button>
                <button class="test-button" id="emotional-btn" onclick="setGradingMode('emotional')">Emotional</button>
                <button class="test-button" id="color-btn" onclick="setGradingMode('color')">Color</button>
                <button class="test-button" onclick="testWordAnalysis()">Test Word Analysis</button>
                <button class="test-button" onclick="clearLog()">Clear Log</button>
            </div>
            <div id="status" class="status">Ready to test grading mode propagation...</div>
        </div>

        <div class="test-section">
            <h2>Current Grading Mode Status</h2>
            <div class="grading-info">
                <div class="grading-card">
                    <h4>Music Theory Engine</h4>
                    <div>Mode: <span class="value" id="engine-mode">-</span></div>
                </div>
                <div class="grading-card">
                    <h4>Lexical Engine</h4>
                    <div>Mode: <span class="value" id="lexical-mode">-</span></div>
                </div>
                <div class="grading-card">
                    <h4>Last Analysis</h4>
                    <div>Reasoning: <span class="value" id="last-reasoning">-</span></div>
                </div>
            </div>
        </div>

        <div class="test-section">
            <h2>Analysis Log</h2>
            <div id="log-output" class="log-output">No analysis performed yet...</div>
        </div>
    </div>

    <script src="music-theory-engine.js"></script>
    <script src="word-database.js"></script>
    <script src="phonetic-analyzer.js"></script>
    <script src="lexical-music-engine-v2.js"></script>
    <script>
        let musicTheory, lexicalEngine;
        let currentMode = 'functional';

        // Initialize the test
        function initTest() {
            try {
                // Initialize music theory engine
                musicTheory = new MusicTheoryEngine();
                musicTheory.setGradingMode('functional');

                // Initialize lexical engine
                const wordDb = new WordDatabase();
                const phoneticAnalyzer = new PhoneticAnalyzer();
                lexicalEngine = new LexicalMusicEngine(musicTheory, wordDb, phoneticAnalyzer);

                updateGradingStatus();
                updateStatus('Grading mode propagation test initialized');
            } catch (error) {
                updateStatus('Error initializing: ' + error.message);
                console.error('Initialization error:', error);
            }
        }

        function setGradingMode(mode) {
            try {
                // Update button states
                document.querySelectorAll('.test-button').forEach(btn => btn.classList.remove('active'));
                document.getElementById(mode + '-btn').classList.add('active');

                // Set grading mode
                musicTheory.setGradingMode(mode);
                currentMode = mode;

                updateGradingStatus();
                updateStatus(`Grading mode changed to: ${mode}`);
                
                // Test with a sample word to see if the mode is reflected
                testWordAnalysis();
            } catch (error) {
                updateStatus('Error changing grading mode: ' + error.message);
            }
        }

        function testWordAnalysis() {
            try {
                const testWord = "exiting new nature";
                updateStatus(`Testing word analysis with "${testWord}" in ${currentMode} mode...`);
                
                // Perform analysis
                const result = lexicalEngine.analyzeWords(testWord);
                
                // Log the result
                const logEntry = `[${new Date().toLocaleTimeString()}] "${testWord}" in ${currentMode} mode:\n`;
                const reasoning = result.reasoning ? result.reasoning.summary : 'No reasoning available';
                const progression = result.progression || 'No progression generated';
                
                const logText = logEntry + 
                    `  Reasoning: ${reasoning}\n` +
                    `  Progression: ${progression}\n` +
                    `  Engine Mode: ${musicTheory.gradingMode}\n` +
                    `  Expected Mode: ${currentMode}\n\n`;
                
                appendToLog(logText);
                
                // Update status displays
                document.getElementById('last-reasoning').textContent = reasoning;
                updateGradingStatus();
                
                // Check if the mode is correctly reflected
                if (reasoning.includes(`(${currentMode} grading)`)) {
                    updateStatus(`✅ Grading mode correctly reflected in analysis: ${currentMode}`);
                } else {
                    updateStatus(`❌ Grading mode mismatch! Expected: ${currentMode}, Got: ${reasoning}`);
                }
                
            } catch (error) {
                updateStatus('Error in word analysis: ' + error.message);
                console.error('Word analysis error:', error);
            }
        }

        function updateGradingStatus() {
            try {
                document.getElementById('engine-mode').textContent = musicTheory.gradingMode || 'Unknown';
                document.getElementById('lexical-mode').textContent = lexicalEngine.musicTheory.gradingMode || 'Unknown';
            } catch (error) {
                console.error('Error updating grading status:', error);
            }
        }

        function appendToLog(text) {
            const logOutput = document.getElementById('log-output');
            if (logOutput.textContent === 'No analysis performed yet...') {
                logOutput.textContent = '';
            }
            logOutput.textContent += text;
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log-output').textContent = 'No analysis performed yet...';
            updateStatus('Log cleared');
        }

        function updateStatus(message) {
            const status = document.getElementById('status');
            status.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initTest);
    </script>
</body>
</html>
