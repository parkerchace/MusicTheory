<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Grading Lexical Integration Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 15px;
            background: #333;
            border-radius: 6px;
        }
        
        .test-title {
            color: #4CAF50;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {
            background: #45a049;
        }
        
        .results {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        
        .tier-good { color: #4CAF50; }
        .tier-fair { color: #FFC107; }
        .tier-poor { color: #F44336; }
        .tier-excellent { color: #00E676; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Enhanced Grading Lexical Integration Test</h1>
        
        <div class="test-section">
            <div class="test-title">Test: Enhanced Grading in Lexical Engine</div>
            <p>This test verifies that the lexical engine is using the enhanced grading system instead of hardcoded tier values.</p>
            
            <button onclick="testEnhancedGrading()">Test Enhanced Grading</button>
            <button onclick="testMultipleWords()">Test Multiple Words</button>
            <button onclick="clearResults()">Clear Results</button>
            
            <div id="results" class="results"></div>
        </div>
    </div>

    <script src="word-database.js"></script>
    <script src="music-theory-engine.js"></script>
    <script src="lexical-music-engine-v2.js"></script>
    
    <script>
        let lexicalEngine;
        
        function log(message) {
            const resultsEl = document.getElementById('results');
            const timestamp = new Date().toLocaleTimeString();
            resultsEl.textContent += `[${timestamp}] ${message}\n`;
            resultsEl.scrollTop = resultsEl.scrollHeight;
        }
        
        function clearResults() {
            document.getElementById('results').textContent = '';
        }
        
        async function initializeEngine() {
            if (!lexicalEngine) {
                const musicTheory = new MusicTheoryEngine();
                lexicalEngine = new LexicalMusicEngineV2(musicTheory);
                log('✅ Lexical engine initialized');
            }
        }
        
        async function testEnhancedGrading() {
            await initializeEngine();
            
            log('🔄 Testing enhanced grading integration...');
            
            try {
                const result = await lexicalEngine.translateWords('unstable spiraling', {
                    weights: { emotional: 0.3, semantic: 0.25, phonetic: 0.15, archetype: 0.1 }
                });
                
                log(`📊 Scale: ${result.scale}`);
                log(`🎵 Progression: ${result.progression.map(c => `${c.fullName} (T${c.tier})`).join(' → ')}`);
                log(`💭 Reasoning: ${result.reasoning ? result.reasoning.summary : 'No reasoning'}`);
                
                // Check if enhanced grading is being used
                const hasEnhancedGrading = result.reasoning && result.reasoning.summary && 
                                         result.reasoning.summary.includes('enhanced grading');
                
                if (hasEnhancedGrading) {
                    log('✅ Enhanced grading is being used!');
                } else {
                    log('❌ Still using functional grading');
                }
                
                // Check tier variety
                const tiers = result.progression.map(c => c.tier);
                const uniqueTiers = [...new Set(tiers)];
                log(`🎯 Tier variety: ${uniqueTiers.join(', ')} (${uniqueTiers.length} unique tiers)`);
                
                if (uniqueTiers.length > 1) {
                    log('✅ Good tier variety detected');
                } else {
                    log('⚠️ Limited tier variety - all chords have same tier');
                }
                
            } catch (err) {
                log(`❌ Error: ${err.message}`);
                console.error(err);
            }
        }
        
        async function testMultipleWords() {
            await initializeEngine();
            
            const testWords = ['happy sunshine', 'dark storm', 'peaceful meadow', 'chaotic energy'];
            
            log('🔄 Testing multiple word combinations...');
            
            for (const words of testWords) {
                try {
                    const result = await lexicalEngine.translateWords(words, {
                        weights: { emotional: 0.3, semantic: 0.25, phonetic: 0.15, archetype: 0.1 }
                    });
                    
                    log(`\n📝 "${words}"`);
                    log(`📊 Scale: ${result.scale}`);
                    log(`🎵 Progression: ${result.progression.map(c => `${c.fullName} (T${c.tier})`).join(' → ')}`);
                    
                    const hasEnhancedGrading = result.reasoning && result.reasoning.summary && 
                                             result.reasoning.summary.includes('enhanced grading');
                    log(`🎯 Enhanced grading: ${hasEnhancedGrading ? '✅' : '❌'}`);
                    
                } catch (err) {
                    log(`❌ Error with "${words}": ${err.message}`);
                }
            }
        }
        
        log('🚀 Enhanced Grading Lexical Integration Test Ready');
        log('Click "Test Enhanced Grading" to verify the integration is working');
    </script>
</body>
</html>
